<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <title>SK Music • Pro Edition | All‑Device Premium Player</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <div class="sidebar">
    <div class="logo">
      <i class="fas fa-head-side-vr"></i>
      <span>SK Music<span style="color:#1db954;">l</span> Pro</span>
    </div>
    <ul class="nav">
      <li class="active"><i class="fas fa-home"></i><span>Home</span></li>
      <li><i class="fas fa-compass"></i><span>Discover</span></li>
      <li><i class="fas fa-heart"></i><span>Liked Songs</span></li>
      <li><i class="fas fa-list-ul"></i><span>Playlists</span></li>
    </ul>
  </div>

  <div class="main">
    <div class="header">
      <h1>Good Evening, Melophile 🎧</h1>
    </div>
    <div class="section-title">
      <h2>Your Daily Dose</h2>
      <i class="fas fa-waveform" style="color:#1db954;"></i>
    </div>
    <div class="song-grid" id="songList"></div>
  </div>
</div>

<div class="player">
  <div class="now-playing">
    <img id="currentCover" src="https://i.ytimg.com/vi/j18MRhEfmPk/maxresdefault.jpg" alt="cover">
    <div class="track-info">
      <h4 id="currentTitle">Ishqa Ve</h4>
      <p id="currentArtist">Zeeshan Ali</p>
    </div>
  </div>
  <div class="player-controls">
    <div class="controls">
      <button id="prev" aria-label="Previous"><i class="fas fa-backward-step"></i></button>
      <button id="play" class="play-pause" aria-label="Play/Pause"><i class="fas fa-play"></i></button>
      <button id="next" aria-label="Next"><i class="fas fa-forward-step"></i></button>
    </div>
    <div class="progress-container">
      <span class="time" id="currentTime">0:00</span>
      <div class="progress-bar" id="progressBar">
        <div class="progress" id="progress"></div>
      </div>
      <span class="time" id="duration">0:00</span>
    </div>
  </div>
  <div class="volume">
    <button id="volumeIcon" aria-label="Volume"><i class="fas fa-volume-up"></i></button>
    <input type="range" id="volumeSlider" class="volume-slider" min="0" max="100" value="80" aria-label="Volume control">
  </div>
</div>

<audio id="audioPlayer" preload="metadata"></audio>

<script src="scr.js"></script>
</body>
</html>
