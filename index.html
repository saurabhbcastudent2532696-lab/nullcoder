<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SK Music • Vibes</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body>
  <div class="container">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="logo">
        <i class="fas fa-music"></i> SK Musicl
      </div>
      <ul class="nav">
        <li class="active"><i class="fas fa-home"></i> Home</li>
        <li><i class="fas fa-search"></i> Discover</li>
        <li><i class="fas fa-heart"></i> Liked Songs</li>
        <li><i class="fas fa-list"></i> Playlists</li>
      </ul>
    </div>

    <!-- Main Content -->
    <div class="main">
      <div class="header">
        <h1>Good Evening, Music Lover 🎵</h1>
      </div>
      <h2 style="margin-bottom: 20px; color: #1db954;">Your Songs</h2>
      <div class="song-list" id="songList"></div>
    </div>
  </div>

  <!-- Bottom Player -->
  <div class="player">
    <div class="now-playing">
      <img id="currentCover" src="https://i.ytimg.com/vi/j18MRhEfmPk/maxresdefault.jpg" alt="cover">
      <div class="track-info">
        <h4 id="currentTitle">Ishqa Ve</h4>
        <p id="currentArtist">Zeeshan Ali</p>
      </div>
    </div>
    <div class="player-controls">
      <div class="controls">
        <button id="prev"><i class="fas fa-step-backward"></i></button>
        <button id="play" class="play-pause"><i class="fas fa-play"></i></button>
        <button id="next"><i class="fas fa-step-forward"></i></button>
      </div>
      <div class="progress-container">
        <span class="time" id="currentTime">4:27</span>
        <div class="progress-bar" id="progressBar">
          <div class="progress" id="progress"></div>
        </div>
        <span class="time" id="duration">3:49</span>
      </div>
    </div>
    <div class="volume">
      <button><i class="fas fa-volume-up"></i></button>
    </div>
  </div>

  <!-- Hidden YouTube Players -->
  <div style="display: none;">
    <iframe id="player1" width="0" height="0" src="https://www.youtube.com/embed/55c6IlV7BEo?enablejsapi=1" frameborder="0" allow="autoplay"></iframe>
    <iframe id="player2" width="0" height="0" src="https://www.youtube.com/embed/j18MRhEfmPk?enablejsapi=1" frameborder="0" allow="autoplay"></iframe>
  </div>

  <script src="scr.js"></script>
</body>
</html>
